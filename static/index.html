<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RAG Chatbot</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* Modern Reset and Design Tokens */
*{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg-app: #090a0f;
  --bg-sidebar: #11131c;
  --bg-chat: #151824;
  --bg-card: #1d2030;
  --bg-bubble-user: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
  --bg-bubble-assistant: #1d2030;
  --border-color: rgba(255, 255, 255, 0.08);
  --text-main: #f3f4f6;
  --text-muted: #9ca3af;
  --text-dim: #6b7280;
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
  --accent-color: #6366f1;
  --glow-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
}

body{font-family:'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;background:var(--bg-app);color:var(--text-main);height:100vh;display:flex;overflow:hidden}
#app{display:flex;width:100%;height:100vh;overflow:hidden}

/* Sidebar Styling */
#sidebar{width:300px;min-width:300px;background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;z-index:10}
.sb-head{padding:24px 20px 20px;border-bottom:1px solid var(--border-color)}
.sb-head h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
.sb-head h2 svg {color: #a855f7}
.sb-head p{font-size:12px;color:var(--text-muted);margin-top:6px;font-weight:300}
.gemini-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:var(--accent-gradient);color:#fff;padding:4px 12px;border-radius:20px;margin-top:12px;box-shadow: 0 4px 12px rgba(168, 85, 247, 0.25);letter-spacing: 0.5px}

#doc-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg-chat);border:1px solid var(--border-color);font-size:13px;transition:all 0.2s ease;animation: fadeIn 0.3s ease}
.doc-item:hover{border-color: rgba(99, 102, 241, 0.4);background: rgba(99, 102, 241, 0.05);transform: translateY(-1px)}
.doc-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-main);font-weight:500}
.chunk-pill{font-size:11px;background:rgba(99, 102, 241, 0.15);color:#a5b4fc;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:600;border: 1px solid rgba(99, 102, 241, 0.25)}
.doc-del{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;line-height:1;padding:2px 6px;border-radius:6px;transition:all 0.15s}
.doc-del:hover{color:#ef4444;background:rgba(239, 68, 68, 0.1)}

.drop-zone{margin:16px;border: 2px dashed rgba(255, 255, 255, 0.15);border-radius:12px;padding:20px;text-align:center;cursor:pointer;color:var(--text-muted);font-size:13px;transition:all 0.2s ease;background: rgba(255, 255, 255, 0.02)}
.drop-zone:hover,.drop-zone.drag{background:rgba(99, 102, 241, 0.06);border-color:var(--accent-color);color:var(--text-main);box-shadow: var(--glow-shadow)}
.drop-zone svg{display:block;margin:0 auto 10px;opacity:.6;transition:all 0.2s}
.drop-zone:hover svg{transform: translateY(-2px);color:var(--accent-color);opacity:1}
#file-input{display:none}
.empty-docs{font-size:12px;color:var(--text-dim);text-align:center;padding:30px 10px}

/* Chat Styling */
#chat{flex:1;display:flex;flex-direction:column;background:var(--bg-chat);position:relative}
.chat-head{padding:16px 24px;background:var(--bg-sidebar);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:12px}
.chat-head h1{font-size:16px;font-weight:600;letter-spacing: 0.5px}
.dot{width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow: 0 0 10px #10b981;flex-shrink:0;transition:all 0.3s}
.dot.off{background:var(--text-dim);box-shadow:none}
#status-text{font-size:12px;color:var(--text-muted);margin-left:auto;font-weight:300}

#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px}
.welcome{text-align:center;color:var(--text-muted);font-size:14px;margin:auto;display:flex;flex-direction:column;align-items:center;gap:14px;max-width:400px}
.welcome svg{opacity:.4;color:var(--accent-color)}
.welcome h3{font-size:18px;color:var(--text-main);font-weight:600}
.welcome p{font-size:13px;line-height:1.5;font-weight:300}

.bubble{max-width:80%;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word;box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);transition: all 0.2s;animation: slideUp 0.3s ease-out}
.bubble.user{align-self:flex-end;background:var(--bg-bubble-user);color:#fff;border-bottom-right-radius:4px}
.bubble.assistant{align-self:flex-start;background:var(--bg-bubble-assistant);border:1px solid var(--border-color);border-bottom-left-radius:4px;color:var(--text-main)}
.bubble.system{align-self:center;background:rgba(255, 255, 255, 0.04);border:1px solid var(--border-color);color:var(--text-muted);font-size:12px;padding:6px 14px;border-radius:20px;box-shadow:none;animation: fadeIn 0.3s}
.bubble ul, .bubble ol {
  margin-left: 20px;
  margin-top: 8px;
  margin-bottom: 8px;
}
.bubble li {
  margin-bottom: 4px;
}
.bubble p {
  margin-bottom: 8px;
}
.bubble p:last-child {
  margin-bottom: 0;
}

.sources{font-size:11px;color:var(--text-muted);margin-top:12px;padding-top:10px;border-top:1px solid rgba(255, 255, 255, 0.08);display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.sources span.title{font-weight:500;margin-right:2px}
.src-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(99, 102, 241, 0.12);border:1px solid rgba(99, 102, 241, 0.2);border-radius:6px;padding:3px 8px;font-size:11px;color:#a5b4fc;font-weight:500}

/* Thinking Indicator */
.thinking-container{display:flex;align-items:center;gap:5px;padding:6px 0}
.thinking-dot{width:8px;height:8px;background-color:var(--text-muted);border-radius:50%;display:inline-block;animation: pulse 1.4s infinite ease-in-out both}
.thinking-dot:nth-child(1){animation-delay:-0.32s}
.thinking-dot:nth-child(2){animation-delay:-0.16s}

/* Input Bar */
.input-bar{padding:18px 24px;background:var(--bg-sidebar);border-top:1px solid var(--border-color);display:flex;gap:12px;align-items:flex-end}
.input-container{flex:1;position:relative;background:var(--bg-chat);border:1px solid var(--border-color);border-radius:12px;transition:all 0.2s}
.input-container:focus-within{border-color:var(--accent-color);box-shadow: var(--glow-shadow)}
#q{width:100%;resize:none;font-size:14px;padding:12px 16px;border:none;background:transparent;font-family:inherit;line-height:1.5;min-height:45px;max-height:120px;overflow-y:auto;color:var(--text-main);outline:none}
#send{height:44px;width:44px;min-width:44px;border-radius:12px;border:none;background:var(--accent-gradient);color:#fff;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25)}
#send:hover{opacity:.95;transform:translateY(-1px);box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4)}
#send:active{transform:translateY(0)}
#send:disabled{background:#2e303e;color:var(--text-dim);cursor:not-allowed;opacity:1;box-shadow:none;transform:none}

/* Animations */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pulse {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1.0); }
}

/* Custom Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
</style>
</head>
<body>
<div id="app">

  <div id="sidebar">
    <div class="sb-head">
      <h2>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        Knowledge Base
      </h2>
    </div>
    <div id="doc-list"><p class="empty-docs">No documents yet</p></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Click or drag files here
    </div>
    <input type="file" id="file-input" accept=".txt,.md,.csv,.pdf" multiple/>
  </div>

  <div id="chat">
    <div class="chat-head">
      <div class="dot off" id="dot"></div>
      <h1>RAG Chatbot</h1>
      <span id="status-text">Upload documents to begin</span>
    </div>
    <div id="messages">
      <div class="welcome">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <h3>Ready to Chat</h3>
        <p>Upload text files, markdown files, CSVs, or PDFs to your knowledge base, then ask questions. Gemini will answer grounded in your files.</p>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-container">
        <textarea id="q" placeholder="Ask a question about your documents…" rows="1"></textarea>
      </div>
      <button id="send" disabled title="Send Question">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const msgEl    = document.getElementById('messages');
const qEl      = document.getElementById('q');
const sendBtn  = document.getElementById('send');
const dotEl    = document.getElementById('dot');
const statusEl = document.getElementById('status-text');
const docList  = document.getElementById('doc-list');
const dropZone = document.getElementById('drop-zone');

qEl.addEventListener('input', () => {
  qEl.style.height = 'auto';
  qEl.style.height = Math.min(qEl.scrollHeight, 120) + 'px';
});
qEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); uploadFiles([...e.dataTransfer.files]); });
document.getElementById('file-input').addEventListener('change', e => { uploadFiles([...e.target.files]); e.target.value = ''; });

async function uploadFiles(files) {
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res  = await fetch('/upload', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) { addMsg('system', 'Error: ' + (data.detail || 'Upload failed')); continue; }
      addMsg('system', `Indexed "${data.filename}" — ${data.chunks} chunks, ${data.words} words`);
    } catch(e) { addMsg('system', 'Upload error: ' + e.message); }
  }
  await refreshDocs();
}

// Helper to return appropriate SVG icon path based on file extension
getFileIcon = (filename) => {
  const ext = filename.split('.').pop().toLowerCase();
  if (ext === 'pdf') {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15h1a2 2 0 0 0 2-2v-1a2 2 0 0 0-2-2H9v5z"/></svg>`;
  } else if (ext === 'csv') {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>`;
  } else {
    return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;
  }
}

async function refreshDocs() {
  const docs = await (await fetch('/documents')).json();
  if (!docs.length) {
    docList.innerHTML = '<p class="empty-docs">No documents yet</p>';
    dotEl.className = 'dot off';
    statusEl.textContent = 'Upload documents to begin';
    sendBtn.disabled = true;
    return;
  }
  const total = docs.reduce((s, d) => s + d.chunks, 0);
  dotEl.className = 'dot';
  statusEl.textContent = `${docs.length} doc${docs.length > 1 ? 's' : ''} · ${total} chunks indexed`;
  sendBtn.disabled = false;
  docList.innerHTML = docs.map(d => `
    <div class="doc-item">
      ${getFileIcon(d.filename)}
      <span class="doc-name" title="${d.filename}">${d.filename}</span>
      <span class="chunk-pill">${d.chunks}</span>
      <button class="doc-del" onclick="deleteDoc('${d.filename}')" title="Remove">×</button>
    </div>`).join('');
}

async function deleteDoc(name) {
  await fetch('/document/' + encodeURIComponent(name), { method: 'DELETE' });
  await refreshDocs();
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    return marked.parse(text);
  }
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, text, sources) {
  const w = msgEl.querySelector('.welcome');
  if (w) w.remove();
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  
  if (text === null) {
    // Return empty placeholder for thinking animation
    msgEl.appendChild(div);
    return div;
  }
  
  if (role === 'user') {
    div.textContent = text;
  } else {
    const mdDiv = document.createElement('div');
    mdDiv.innerHTML = renderMarkdown(text);
    div.appendChild(mdDiv);
  }
  
  if (sources && sources.length) {
    const s = document.createElement('div');
    s.className = 'sources';
    s.innerHTML = '<span class="title">Sources:</span>' + sources.map(src => `<span class="src-tag">${src}</span>`).join('');
    div.appendChild(s);
  }
  msgEl.appendChild(div);
  msgEl.scrollTop = msgEl.scrollHeight;
  return div;
}

sendBtn.addEventListener('click', async () => {
  const q = qEl.value.trim();
  if (!q) return;
  qEl.value = '';
  qEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMsg('user', q);

  const thinking = addMsg('assistant', null);
  thinking.innerHTML = `
    <div class="thinking-container">
      <span style="font-size:12px;color:var(--text-muted);margin-right:8px;">Gemini is thinking</span>
      <span class="thinking-dot"></span>
      <span class="thinking-dot"></span>
      <span class="thinking-dot"></span>
    </div>
  `;

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    const data = await res.json();
    thinking.innerHTML = ''; // clear thinking container
    const mdDiv = document.createElement('div');
    mdDiv.innerHTML = renderMarkdown(data.answer);
    thinking.appendChild(mdDiv);
    if (data.sources && data.sources.length) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.innerHTML = '<span class="title">Sources:</span>' + data.sources.map(src => `<span class="src-tag">${src}</span>`).join('');
      thinking.appendChild(s);
    }
  } catch(e) {
    thinking.innerHTML = '';
    thinking.textContent = 'Error: ' + e.message;
  }
  sendBtn.disabled = false;
  qEl.focus();
  msgEl.scrollTop = msgEl.scrollHeight;
});

refreshDocs();
</script>
</body>
</html>
